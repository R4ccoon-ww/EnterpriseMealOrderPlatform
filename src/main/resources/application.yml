server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/webox?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: webox123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

webox:
  jwt:
    # 演示用密钥，生产环境应通过环境变量注入
    secret: ${WEBOX_JWT_SECRET:webox-demo-secret-key-change-in-production}
    expire-hours: 72
  ai:
    # 配置 ANTHROPIC_API_KEY 环境变量后走真实 LLM，否则自动降级为规则引擎
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-opus-4-8
    base-url: https://api.anthropic.com

logging:
  level:
    com.webox: debug
