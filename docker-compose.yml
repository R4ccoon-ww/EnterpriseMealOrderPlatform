services:
  mysql:
    image: mysql:8.0
    container_name: webox-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: webox123
      MYSQL_DATABASE: webox
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - webox-mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  webox-mysql-data:
